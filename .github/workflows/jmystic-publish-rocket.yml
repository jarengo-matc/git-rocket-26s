# ─────────────────────────────────────────────────────────────
# Student Publish Workflow Template
# ─────────────────────────────────────────────────────────────
# SETUP STEPS:
#
# 1. Copy this file to .github/workflows/ and rename it:
#      <your-name>-publish.yml
#    Example: tsteele-publish.yml
#
# 2. Replace YOUR_BRANCH (appears twice below) with your branch name.
#    Example: tsteele/rocket-page
#
# 3. Replace YOUR_FILENAME with your desired HTML filename.
#    Use your name so it doesn't clash with others.
#    Example: tsteele.html
#
# 4. Commit this workflow file to YOUR branch and push.
#    On every push the workflow will open (or update) a pull
#    request to add your rocket page to main's docs/ folder.
#    Once the PR is merged, pages.yml publishes docs/ to gh-pages.
#    Your page will then be served at:
#    https://<org>.github.io/git-rocket/YOUR_FILENAME
# ─────────────────────────────────────────────────────────────

name: "Publish rocket page"
run-name: "Publish ${{ github.ref_name }} → ${{ github.event.head_commit.message }}"

env:
  STUDENT_BRANCH: jmystic/publish-rocket     # e.g. tsteele/rocket-page
  OUTPUT_FILENAME: jmystic-rocket.html  # e.g. tsteele.html

on:
  push:
    branches:
      -  jmystic/publish-rocket # ← must match STUDENT_BRANCH above

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out student branch
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build rocket HTML
        run: npm run build:docs
        # Generates docs/index.html from your branch's git-rocket.js

      - name: Rename built file to your filename
        run: cp docs/index.html docs/${{ env.OUTPUT_FILENAME }}

      - name: Push built file to publish branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUBLISH_BRANCH="publish/${{ env.OUTPUT_FILENAME }}"

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          open_pr_count=$(gh pr list --head "$PUBLISH_BRANCH" --state open --json number --jq 'length')
          if [ "$open_pr_count" -gt 0 ]; then
            echo "Open PR already exists — updating $PUBLISH_BRANCH."
          else
            echo "No open PR exists — creating a new PR from $PUBLISH_BRANCH."
          fi

          # Save the built file before switching branches
          cp docs/${{ env.OUTPUT_FILENAME }} /tmp/${{ env.OUTPUT_FILENAME }}

          # Base the publish branch on main so the PR only contains the HTML file
          git fetch origin main
          git switch -c "$PUBLISH_BRANCH" origin/main 2>/dev/null || \
            git switch "$PUBLISH_BRANCH" && git reset --hard origin/main

          # Restore the built file
          mkdir -p docs
          cp /tmp/${{ env.OUTPUT_FILENAME }} docs/${{ env.OUTPUT_FILENAME }}

          git add -f docs/${{ env.OUTPUT_FILENAME }}
          git diff --cached --quiet && echo "No changes, skipping PR." && exit 0

          git commit -m "publish: ${{ env.OUTPUT_FILENAME }} from ${{ env.STUDENT_BRANCH }}"
          git push origin "$PUBLISH_BRANCH" --force

          if [ "$open_pr_count" -gt 0 ]; then
            echo "Open PR updated."
          else
            gh pr create \
              --base main \
              --head "$PUBLISH_BRANCH" \
              --title "Publish ${{ env.OUTPUT_FILENAME }} to GitHub Pages" \
              --body "Automated PR from \`${{ env.STUDENT_BRANCH }}\`. Merging will add \`docs/${{ env.OUTPUT_FILENAME }}\` to main and trigger a GitHub Pages deployment."
          fi
