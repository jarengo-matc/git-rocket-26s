# Student Workflow Template
# ─────────────────────────
# 1. Copy this file and rename it: <your-name>-<group>.yml
#    Example: tsteele-nose-cone.yml
#
# 2. Replace YOUR_NAME and YOUR_GROUP below.
#
# Available npm scripts (pick one):
#   npm run test:nose-cone tsteele
#   npm run test:upper-body devon
#   npm run test:body-panels jeff
#   npm run test:fins natalie
#   npm run test:nozzle brock
#   npm run test:full-rocket scott
#   npm run test:flames jay-byrd
#   npm run test:sanitize-valid rane
#   npm run test:sanitize-invalid john
#   npm run test:sanitize-profanity

name: "jmystic - flames jay-byrd tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Replace test:YOUR_GROUP with your assigned script, e.g. test:nose-cone
      - run: npm run test:flames
